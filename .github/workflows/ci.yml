# ci.yml — emitted by genesis. Pure GitHub Actions — NO AI runs here.
# Stack: Rust workspace (hot path / engine) + Python (ml/ training). project-type: service + worker.
name: ci
on:
  push:
  pull_request:
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: "clippy, rustfmt"
      - run: cargo fmt --all -- --check                  # format gate
      - run: cargo clippy --all-targets -- -D warnings   # lint
      - run: cargo test --all                            # test
      - run: cargo build --release                       # build (service/worker — no packaging)

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"                         # verify pins
      - run: uv sync --dev
        working-directory: ml
      - run: uv run ruff check .                          # lint
        working-directory: ml
      - run: uv run pytest -q                             # test
        working-directory: ml
